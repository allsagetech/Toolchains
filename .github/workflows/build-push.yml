name: Build Toolchain Packages

on:
  push:
  pull_request:
  schedule:
    - cron: '9 2 */4 * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  init:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: windows-2022
    outputs:
      matrix: ${{ steps.init.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Toolchain module
        shell: pwsh
        env:
          TOOLCHAIN_REPO: allsagetech/toolchain
          TOOLCHAIN_REF: pipeline
          GH_TOKEN: ${{ github.token }}
        run: .\scripts\install-toolchain.ps1

      - name: Analyze packages
        id: init
        shell: pwsh
        env:
          TLC_DOCKER_REPO: ${{ secrets.TLC_DOCKER_REPO || 'allsagetech/toolchains' }}
          GH_TOKEN: ${{ github.token }}
          ENABLE_WINDOWS_DOCKER_PUBLISH: ${{ vars.ENABLE_WINDOWS_DOCKER_PUBLISH }}
        run: |
          $ErrorActionPreference = 'Stop'

          . .\src\main.ps1
          Save-WorkflowMatrix

          $raw = Get-Content .matrix -Raw
          $obj = $raw | ConvertFrom-Json

          if ($null -eq $obj.include -or @($obj.include).Count -eq 0) {
            Write-Host "Save-WorkflowMatrix returned 0 packages; falling back to all scripts in .\src\pkgs\"
            $all = Get-ChildItem -Path .\src\pkgs\ -Filter *.ps1 -Recurse | Sort-Object -Property FullName
            $include = foreach ($script in $all) {
              Clear-TlcPackageScript
              & $script.FullName
              Test-TlcPackageScript

              $runsOn = if ($TlcPackageConfig.RunsOn) { $TlcPackageConfig.RunsOn } else { Get-TlcDefaultWindowsRunner }
              $publishRunsOn = if ($TlcPackageConfig.PublishRunsOn) { $TlcPackageConfig.PublishRunsOn } elseif (Test-TlcRunsOnUbuntu -RunsOn $runsOn) { $runsOn } else { Get-TlcDefaultWindowsDockerRunner }
              $tier = if ($TlcPackageConfig.Tier) { [string]$TlcPackageConfig.Tier } else { 'tooling' }
              $isUbuntuRunner = Test-TlcRunsOnUbuntu -RunsOn $runsOn
              $isUbuntuPublishRunner = Test-TlcRunsOnUbuntu -RunsOn $publishRunsOn
              [pscustomobject]@{
                package            = $script.FullName.Replace((Get-Location).Path, '.')
                runs_on            = $runsOn
                publish_runs_on    = $publishRunsOn
                tier               = $tier
                pkg_root           = if ($isUbuntuRunner) { '/mnt/toolchains-pkg' } else { 'C:\toolchains-pkg' }
                cache_path         = if ($isUbuntuRunner) { '/mnt/toolchains-pkg/cache' } else { 'C:\toolchains-pkg\cache' }
                publish_pkg_root   = if ($isUbuntuPublishRunner) { '/mnt/toolchains-pkg' } else { 'C:\toolchains-pkg' }
                publish_cache_path = if ($isUbuntuPublishRunner) { '/mnt/toolchains-pkg/cache' } else { 'C:\toolchains-pkg\cache' }
              }
            }
            Clear-TlcPackageScript
            $raw = (ConvertTo-Json @{ include = @($include) } -Compress)
            $obj = $raw | ConvertFrom-Json
          }

          $include = @($obj.include)
          $isPullRequest = ($env:GITHUB_EVENT_NAME -eq 'pull_request')
          $isMainPush = ($env:GITHUB_EVENT_NAME -eq 'push' -and $env:GITHUB_REF -eq 'refs/heads/main')
          $isScheduled = ($env:GITHUB_EVENT_NAME -eq 'schedule')
          $isManual = ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch')

          if ($isPullRequest) {
            $include = @()
          } else {
            $include = @($include | Where-Object {
              $tier = if ($_.tier) { [string]$_.tier } else { 'tooling' }
              $baseName = [IO.Path]::GetFileNameWithoutExtension([string]$_.package)
              $matchesRef = $false
              if ($env:GITHUB_REF_NAME) {
                $matchesRef = ($env:GITHUB_REF_NAME -eq $baseName -or $env:GITHUB_REF_NAME.StartsWith("$baseName-"))
              }

              ($tier -eq 'tooling') -or
                ($tier -eq 'model-small' -and ($isMainPush -or $isScheduled -or $isManual -or $matchesRef)) -or
                ($tier -eq 'model-large' -and ($isScheduled -or $isManual -or $matchesRef))
            })

            foreach ($entry in $include) {
              $tier = if ($entry.tier) { [string]$entry.tier } else { 'tooling' }
              if ($tier -eq 'model-large') {
                $entry.runs_on = @('self-hosted', 'linux', 'x64', 'toolchains-large')
                $entry.publish_runs_on = @('self-hosted', 'linux', 'x64', 'toolchains-large')
                $entry.pkg_root = '/mnt/toolchains-pkg'
                $entry.cache_path = '/mnt/toolchains-pkg/cache'
                $entry.publish_pkg_root = '/mnt/toolchains-pkg'
                $entry.publish_cache_path = '/mnt/toolchains-pkg/cache'
              }
            }

            $enableWindowsDockerPublish = ($env:ENABLE_WINDOWS_DOCKER_PUBLISH -eq 'true')
            if (-not $enableWindowsDockerPublish) {
              $include = @($include | Where-Object {
                Test-TlcRunsOnUbuntu -RunsOn $_.publish_runs_on
              })
            }
          }

          $raw = (ConvertTo-Json @{ include = $include } -Depth 50 -Compress)
          "matrix=$raw" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

  test:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Toolchains scripts
        shell: pwsh
        run: .\scripts\test-toolchains.ps1

  build:
    needs: [init, test]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}

    env:
      GH_TOKEN: ${{ github.token }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TLC_DOCKER_REPO: ${{ secrets.TLC_DOCKER_REPO || 'allsagetech/toolchains' }}
      TLC_PKG_ROOT: ${{ matrix.pkg_root }}
      TLC_COSIGN_SIGN: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up Java (required for SonarScanner 8.x)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Verify Java
        shell: pwsh
        run: |
          java -version
          Write-Host "JAVA_HOME=$env:JAVA_HOME"

      - name: Prepare Package Storage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /mnt/toolchains-pkg/cache
          sudo chown -R "$(id -u):$(id -g)" /mnt/toolchains-pkg

      - name: Ensure cache directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path (Join-Path $env:TLC_PKG_ROOT 'cache') -Force | Out-Null

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache_path }}
          key: tlc-cache-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('src/util.ps1', 'src/pkgs/**') }}
          restore-keys: |
            tlc-cache-${{ runner.os }}-${{ github.ref_name }}-
            tlc-cache-${{ runner.os }}-

      - name: Install Toolchain module
        shell: pwsh
        env:
          TOOLCHAIN_REPO: allsagetech/toolchain
          TOOLCHAIN_REF: pipeline
          GH_TOKEN: ${{ github.token }}
        run: .\scripts\install-toolchain.ps1

      - name: Run ${{ matrix.package }}
        id: pkg
        shell: pwsh
        env:
          TLC_PKG_ROOT: ${{ matrix.pkg_root }}
          TLC_DOCKER_REPO: ${{ secrets.TLC_DOCKER_REPO || 'allsagetech/toolchains' }}
        run: |
          $ErrorActionPreference = 'Stop'

          $scriptRel = '${{ matrix.package }}'
          $isVsBuildTools = $scriptRel -match 'vs-buildtools\.ps1$'

          if ($isVsBuildTools) {
            if (Test-Path $env:TLC_PKG_ROOT) { Remove-Item -Recurse -Force $env:TLC_PKG_ROOT }
          } else {
            if (Test-Path $env:TLC_PKG_ROOT) {
              Get-ChildItem -LiteralPath $env:TLC_PKG_ROOT -Force |
                Where-Object { $_.Name -ne 'cache' } |
                Remove-Item -Recurse -Force
            } else {
              New-Item -ItemType Directory -Path $env:TLC_PKG_ROOT -Force | Out-Null
            }
            New-Item -ItemType Directory -Path (Join-Path $env:TLC_PKG_ROOT 'cache') -Force | Out-Null
          }

          if ($env:RUNNER_OS -eq 'Windows' -and (Test-Path $env:TLC_PKG_ROOT)) {
            if (Test-Path 'C:\pkg') { Remove-Item -Recurse -Force 'C:\pkg' }
            cmd /c "mklink /J C:\pkg `"$($env:TLC_PKG_ROOT)`"" | Out-Null
          }

          . .\src\main.ps1
          Clear-TlcPackageScript

          $scriptPath = (Resolve-Path '${{ matrix.package }}').Path
          Invoke-TlcScript $scriptPath

          "script=$scriptRel" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "up-to-date=$([bool]$TlcPackageConfig.UpToDate)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($TlcPackageConfig.Name)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$($TlcPackageConfig.Version)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Scan package
        if: ${{ runner.os == 'Windows' && steps.pkg.outputs.up-to-date == 'False' }}
        shell: pwsh
        env:
          TLC_PKG_ROOT: ${{ matrix.pkg_root }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path 'C:\pkg')) {
            cmd /c "mklink /J C:\pkg `"$($env:TLC_PKG_ROOT)`"" | Out-Null
          }
          . .\src\main.ps1
          Invoke-TlcPackageScan

  publish:
    needs: [init, test, build]
    if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) }}
    runs-on: ${{ matrix.publish_runs_on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.init.outputs.matrix) }}

    env:
      GH_TOKEN: ${{ github.token }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      TLC_DOCKER_REPO: ${{ secrets.TLC_DOCKER_REPO || 'allsagetech/toolchains' }}
      TLC_PKG_ROOT: ${{ matrix.publish_pkg_root }}
      TLC_COSIGN_SIGN: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Package Storage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /mnt/toolchains-pkg/cache
          sudo chown -R "$(id -u):$(id -g)" /mnt/toolchains-pkg

      - name: Ensure cache directory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path (Join-Path $env:TLC_PKG_ROOT 'cache') -Force | Out-Null

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: ${{ matrix.publish_cache_path }}
          key: tlc-publish-cache-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('src/util.ps1', 'src/pkgs/**') }}
          restore-keys: |
            tlc-publish-cache-${{ runner.os }}-${{ github.ref_name }}-
            tlc-publish-cache-${{ runner.os }}-

      - name: Install Toolchain module
        shell: pwsh
        env:
          TOOLCHAIN_REPO: allsagetech/toolchain
          TOOLCHAIN_REF: pipeline
          GH_TOKEN: ${{ github.token }}
        run: .\scripts\install-toolchain.ps1

      - name: Prepare Docker Storage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          docker_root="/mnt/docker-data"
          sudo systemctl stop docker
          sudo rm -rf /var/lib/docker
          sudo mkdir -p "$docker_root"
          sudo ln -s "$docker_root" /var/lib/docker
          sudo systemctl start docker
          docker info > /dev/null

      - name: Install Cosign (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = 'v2.6.0'
          $url = "https://github.com/sigstore/cosign/releases/download/$version/cosign-windows-amd64.exe"
          $installDir = "$env:ProgramFiles\cosign"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$installDir\cosign.exe"
          "$installDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Cosign (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = 'v2.6.0'
          $url = "https://github.com/sigstore/cosign/releases/download/$version/cosign-linux-amd64"
          $installDir = Join-Path $env:RUNNER_TEMP 'cosign'
          $binaryPath = Join-Path $installDir 'cosign'
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $binaryPath
          & chmod +x $binaryPath
          "$installDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Docker daemon
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          docker version
          docker info

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish ${{ matrix.package }}
        id: publish
        shell: pwsh
        env:
          TLC_PKG_ROOT: ${{ matrix.publish_pkg_root }}
          TLC_DOCKER_REPO: ${{ secrets.TLC_DOCKER_REPO || 'allsagetech/toolchains' }}
        run: |
          $ErrorActionPreference = 'Stop'

          $scriptRel = '${{ matrix.package }}'
          $isVsBuildTools = $scriptRel -match 'vs-buildtools\.ps1$'

          if ($isVsBuildTools) {
            if (Test-Path $env:TLC_PKG_ROOT) { Remove-Item -Recurse -Force $env:TLC_PKG_ROOT }
          } else {
            if (Test-Path $env:TLC_PKG_ROOT) {
              Get-ChildItem -LiteralPath $env:TLC_PKG_ROOT -Force |
                Where-Object { $_.Name -ne 'cache' } |
                Remove-Item -Recurse -Force
            } else {
              New-Item -ItemType Directory -Path $env:TLC_PKG_ROOT -Force | Out-Null
            }
            New-Item -ItemType Directory -Path (Join-Path $env:TLC_PKG_ROOT 'cache') -Force | Out-Null
          }

          if ($env:RUNNER_OS -eq 'Windows' -and (Test-Path $env:TLC_PKG_ROOT)) {
            if (Test-Path 'C:\pkg') { Remove-Item -Recurse -Force 'C:\pkg' }
            cmd /c "mklink /J C:\pkg `"$($env:TLC_PKG_ROOT)`"" | Out-Null
          }

          . .\src\main.ps1
          Clear-TlcPackageScript

          $scriptPath = (Resolve-Path '${{ matrix.package }}').Path
          Invoke-TlcScript $scriptPath

          "script=$scriptRel" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "up-to-date=$([bool]$TlcPackageConfig.UpToDate)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=$($TlcPackageConfig.Name)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "version=$($TlcPackageConfig.Version)" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($TlcPackageConfig.UpToDate) {
            Write-Host "Skip publish: $($TlcPackageConfig.Name) up-to-date"
            return
          }

          Invoke-DockerPush $TlcPackageConfig.Name $TlcPackageConfig.Version

      - name: Trigger Toolchain contract tests
        continue-on-error: true
        if: ${{ github.ref == 'refs/heads/main' && steps.publish.outputs.up-to-date == 'False' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TOOLCHAIN_CONTRACT_TOKEN: ${{ secrets.TOOLCHAIN_CONTRACT_TOKEN }}
          TOOLCHAIN_REPO: allsagetech/toolchain
          TLC_DOCKER_REPO: ${{ secrets.TLC_DOCKER_REPO || 'allsagetech/toolchains' }}
        run: |
          $ErrorActionPreference = 'Stop'

          $token = if ($env:TOOLCHAIN_CONTRACT_TOKEN) { $env:TOOLCHAIN_CONTRACT_TOKEN } else { $env:GH_TOKEN }
          if (-not $token) {
            Write-Host 'No GitHub token available; skipping contract dispatch.'
            exit 0
          }

          $name    = '${{ steps.publish.outputs.name }}'
          $version = '${{ steps.publish.outputs.version }}'
          $safeVer = $version.Replace('+','_')
          $repo    = $env:TLC_DOCKER_REPO
          $tag     = "${repo}:$name-$safeVer"

          $digRef = (& docker inspect --format '{{index .RepoDigests 0}}' $tag 2>$null).Trim()
          if (-not $digRef) {
            Write-Host "Could not determine RepoDigests for $tag; skipping contract dispatch."
            exit 0
          }

          $labelsJson = (& docker inspect --format '{{ json .Config.Labels }}' $tag 2>$null).Trim()
          $labels = @{}
          if ($labelsJson) {
            try { $labels = $labelsJson | ConvertFrom-Json } catch { $labels = @{} }
          }

          $specVersion = $labels.'io.allsagetech.toolchain.specVersion'
          $tlcPath     = $labels.'io.allsagetech.toolchain.tlcPath'
          $tlcSha256   = $labels.'io.allsagetech.toolchain.tlcSha256'

          $digest = ($digRef -split '@',2)[1]

          $payload = @{
            dockerRepo      = $repo
            packageName     = $name
            packageVersion  = $version
            tag             = "$name-$safeVer"
            repoDigestRef   = $digRef
            digest          = $digest
            packageRef      = "$name@$digest"
            specVersion     = $specVersion
            tlcPath         = $tlcPath
            tlcSha256       = $tlcSha256
            sourceRepo      = $env:GITHUB_REPOSITORY
            sourceRunId     = $env:GITHUB_RUN_ID
            sourceSha       = $env:GITHUB_SHA
          }

          $headers = @{
            'Authorization' = "Bearer $token"
            'Accept'        = 'application/vnd.github+json'
            'User-Agent'    = 'actions-toolchains'
            'X-GitHub-Api-Version' = '2022-11-28'
          }

          $body = @{
            event_type     = 'toolchains-built'
            client_payload = $payload
          } | ConvertTo-Json -Compress -Depth 10

          Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/$env:TOOLCHAIN_REPO/dispatches" -Headers $headers -Body $body
